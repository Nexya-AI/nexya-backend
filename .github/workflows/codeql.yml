# NEXYA Backend — CodeQL security scan (Session L1)
#
# Détecte automatiquement les patterns dangereux (SQL injection, XSS,
# hardcoded creds, path traversal, etc.) via les queries CWE de GitHub.
# Résultats remontés dans l'onglet « Security » du repo.
#
# ⚠️ Trigger workflow_dispatch UNIQUEMENT (audit remediation 2026-05-01) :
# CodeQL exige GitHub Advanced Security activée. Gratuit sur repo public,
# payant ~$49/user/mois sur repo privé. Tant qu'Advanced Security n'est
# pas activée sur Settings → Code security → Code scanning, ce workflow
# fail systématiquement avec « Advanced Security must be enabled ».
# Le workflow_dispatch permet de l'activer manuellement quand le settings
# est ON, ou de garder le workflow versionné pour activation future.
# Non-bloquant pour CI principal — visibilité seulement.

name: CodeQL

on:
  workflow_dispatch:
  # schedule + push:main réactivables quand Advanced Security activée :
  # schedule:
  #   - cron: '0 6 * * 1'   # lundi 6h UTC
  # push:
  #   branches: [main]

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # nécessaire pour push les résultats SARIF
  actions: read            # nécessaire pour CodeQL action interne

jobs:
  analyze:
    name: CodeQL Python analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # `default` queries V1 (suffisent — couvre OWASP top 10 + CWE-25
          # les plus communs). Custom queries → V2 si besoin réel.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
