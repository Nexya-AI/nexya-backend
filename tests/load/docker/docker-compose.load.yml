# NEXYA Backend — Stack de tests de charge (Session N4 volet A)
#
# Lance une stack éphémère (postgres pgvector + redis + minio + backend
# build) sur des ports non conflictuels avec le dev quotidien (postgres
# natif Windows 5432). Bootstrap migrations + seed dev users via
# `bootstrap.sh`.
#
# Usage :
#   bash tests/load/docker/bootstrap.sh
#   k6 run tests/load/scenarios/auth_burst.js
#   bash tests/load/docker/teardown.sh
#
# Anti-overengineering : pas de container prometheus/grafana ici. Les
# métriques k6 sortent en HTML/JSON local. K2 dashboards reste pour
# l'observabilité prod (post-L2 staging).

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexya-load-postgres
    environment:
      POSTGRES_USER: nexya
      POSTGRES_PASSWORD: nexya_load_pwd
      POSTGRES_DB: nexya_load
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "65532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexya -d nexya_load"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [nexya-load]

  redis:
    image: redis:7-alpine
    container_name: nexya-load-redis
    ports:
      - "65533:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [nexya-load]

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: nexya-load-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexya
      MINIO_ROOT_PASSWORD: nexya_load_pwd
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [nexya-load]

  backend:
    build:
      context: ../../..
      dockerfile: docker/Dockerfile
    container_name: nexya-load-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENV: development
      APP_SECRET: nexya-load-test-secret
      DATABASE_URL: "postgresql+psycopg://nexya:nexya_load_pwd@postgres:5432/nexya_load"
      REDIS_URL: "redis://redis:6379/0"
      ALLOWED_ORIGINS: "*"
      # Tous les providers en mock — on teste la chaîne HTTP/DB/Redis
      # sous charge, pas la latence Gemini qui dépend de Google.
      EMBEDDINGS_MOCK_ENABLED: "true"
      VOICE_MOCK_ENABLED: "true"
      VISION_MOCK_ENABLED: "true"
      FCM_MOCK_ENABLED: "true"
      STORAGE_MOCK_ENABLED: "false"  # MinIO réel via le service docker
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "nexya"
      S3_SECRET_KEY: "nexya_load_pwd"
      S3_BUCKET: "nexya-load"
      # JWT keys volatiles — régénérées à chaque bootstrap.sh
      JWT_PRIVATE_KEY_FILE: "/run/secrets/jwt_private.pem"
      JWT_PUBLIC_KEY_FILE: "/run/secrets/jwt_public.pem"
    volumes:
      - ../tmp/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ../tmp/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks: [nexya-load]

networks:
  nexya-load:
    driver: bridge
